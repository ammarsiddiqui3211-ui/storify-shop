                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                                Product &amp; Payment Summary
                            </div>
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                                <span style="font-weight:700; font-size:14px; color:var(--primary);">${escapeHtml(prodName)}</span>
                                <span style="font-size:11.5px; color:var(--text-light);">${dateStr}</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; font-size:12.5px; color:var(--text-light); margin-bottom:4px;">
                                <span>Unit Price</span>
                                <span>${formatPrice(item.price_at_purchase)}</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; font-size:12.5px; color:var(--text-light); margin-bottom:6px;">
                                <span>Quantity</span>
                                <span>× ${item.quantity}</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; font-size:14px; font-weight:800; color:var(--primary); padding-top:6px; border-top:1px dashed var(--border);">
                                <span>Total Price</span>
                                <span>${formatPrice(total)}</span>
                            </div>
                        </div>
                    </div>

                    <div style="display:flex; justify-content: flex-end; gap: 10px; margin-top:18px;">
                        ${actionBtn}
                        <button class="btn" style="padding: 6px 12px; font-size:12px;" onclick="viewPackingSlip(${item.id}); this.closest('.modal').remove();">Packing Slip</button>
                        <button class="btn" style="padding: 6px 12px; font-size:12px;" onclick="this.closest('.modal').remove()">Close</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function viewPackingSlip(itemId) {
            const item = orderItems.find(i => i.id === itemId);
            if (!item) return;

            const prod = products.find(p => p.id === item.product_id) || {};
            const prodName = prod.name || `Product ID #${item.product_id}`;

            const modal = document.createElement('div');
            modal.className = "modal";
            modal.innerHTML = `
                <div class="modal-card">
                    <button style="position:absolute; top:15px; right:15px; background:none; border:none; font-size:24px; cursor:pointer;" onclick="this.parentElement.parentElement.remove()">×</button>
                    <div id="printArea" style="font-family: 'Inter', sans-serif; color: #000; padding: 10px;">
                        <h2 style="border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 15px; text-transform: uppercase;">Packing Slip</h2>
                        
                        <table style="width: 100%; margin-bottom: 20px;">
                            <tr>
                                <td style="border:none; padding:4px 0; width:50%;">
                                    <strong>Vendor Store:</strong> ${escapeHtml(profile.shop_name)}
                                </td>
                                <td style="border:none; padding:4px 0; text-align:right;">
                                    <strong>Order Reference:</strong> #${escapeHtml(item.orders?.order_ref)}
                                </td>
                            </tr>
                            <tr>
                                <td style="border:none; padding:4px 0;">
                                    <strong>Shipper Name:</strong> Storify Logistics
                                </td>
                                <td style="border:none; padding:4px 0; text-align:right;">
                                    <strong>Date:</strong> ${new Date(item.created_at).toLocaleDateString()}
                                </td>
                            </tr>
                        </table>

                        <h3 style="border-bottom: 1px solid #000; padding-bottom: 4px; margin-bottom: 10px; font-size: 14px; text-transform: uppercase;">Ship To:</h3>
                        <p style="margin-bottom: 20px; font-size:13px; line-height: 1.5;">
                            <strong>${escapeHtml(item.orders?.shipping_name)}</strong><br>
                            Phone: ${escapeHtml(item.orders?.shipping_phone)}<br>
                            Email: ${escapeHtml(item.orders?.shipping_email)}<br>
                            Address: ${escapeHtml(item.orders?.shipping_address)}
                        </p>

                        <h3 style="border-bottom: 1px solid #000; padding-bottom: 4px; margin-bottom: 10px; font-size: 14px; text-transform: uppercase;">Items Ordered</h3>
                        <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                            <thead>
                                <tr style="border-bottom: 1.5px solid #000;">
                                    <th style="background:none; color:#000; padding: 8px 0; text-align:left;">Product Name</th>
                                    <th style="background:none; color:#000; padding: 8px 0; text-align:center; width: 15%;">Quantity</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr style="border-bottom: 1px solid #ccc;">
                                    <td style="padding: 10px 0;">${escapeHtml(prodName)}</td>
                                    <td style="padding: 10px 0; text-align:center;">${item.quantity}</td>
                                </tr>
                            </tbody>
                        </table>

                        <div style="margin-top: 50px; text-align: center; font-size: 11px; border-top: 1px dashed #ccc; padding-top: 15px;">
                            Thank you for shopping on Storify Marketplace!
                        </div>
                    </div>
                    <div style="display:flex; justify-content: flex-end; gap: 10px; margin-top:20px;">
                        <button class="btn btn-primary" onclick="window.print()">Print Slip</button>
                        <button class="btn" onclick="this.parentElement.parentElement.parentElement.remove()">Close</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        // ==========================================
        // 4E. TAB: EARNINGS & STATEMENT EXPORT
        // ==========================================
        function renderEarningsTab(container) {
            // Group by order_id for per-seller per-order shipping fee calculation
            const itemsByOrder = {};
            orderItems.forEach(item => {
                if (!itemsByOrder[item.order_id]) {
                    itemsByOrder[item.order_id] = [];
                }
                itemsByOrder[item.order_id].push(item);
            });

            let productEscrow = 0;
            let shippingEscrow = 0;
            let productEligible = 0;
            let shippingEligible = 0;

            Object.entries(itemsByOrder).forEach(([orderId, items]) => {
                let orderProductEscrow = 0;
                let orderProductEligible = 0;
                let maxShippingFee = 0;
                let hasEscrowItems = false;
                let allItemsCompleted = true;
                let isAlreadyReleased = false;

                items.forEach(item => {
                    const itemAmt = Number(item.price_at_purchase) * Number(item.quantity);
                    const itemShipping = Number(item.shipping_fee_at_purchase || 0);
                    if (itemShipping > maxShippingFee) {
                        maxShippingFee = itemShipping;
                    }

                    if (['paid_escrow', 'shipped', 'return_window', 'disputed', 'delivered'].includes(item.item_status)) {
                        orderProductEscrow += itemAmt;
                        hasEscrowItems = true;
                        allItemsCompleted = false;
                    } else if (item.item_status === 'completed') {
                        if (!item.payout_released) {
                            orderProductEligible += itemAmt;
                        } else {
                            isAlreadyReleased = true;
                        }
                    } else {
                        allItemsCompleted = false;
                    }
                });

                productEscrow += orderProductEscrow;
                productEligible += orderProductEligible;

                if (hasEscrowItems) {
                    shippingEscrow += maxShippingFee;
                } else if (allItemsCompleted && !isAlreadyReleased && items.length > 0) {
                    shippingEligible += maxShippingFee;
                }
            });

            const pendingEscrow = productEscrow + shippingEscrow;
            const eligiblePayout = productEligible + shippingEligible;

            container.innerHTML = `
                <div class="dashboard-header">
                    <h2 class="dashboard-title">Earnings & Statement</h2>
                    <button class="btn btn-primary" style="padding: 8px 16px; font-size: 12px; display:inline-flex; align-items:center; gap:6px;" onclick="exportStatementCSV()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Download Statement (.CSV)
                    </button>
                </div>

                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 28px;">
                    <!-- Box 1: Held in Escrow -->
                    <div style="background: linear-gradient(135deg, #1e3a8a, #2563eb); border-radius: 14px; padding: 22px 24px; color: #ffffff; box-shadow: 0 8px 20px rgba(30, 58, 138, 0.22);">
                        <span style="font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: rgba(255, 255, 255, 0.85);">Held in Escrow</span>
                        <div style="font-size: 26px; font-weight: 800; color: #ffffff; margin: 4px 0 2px 0;">${formatPrice(pendingEscrow)}</div>
                        <div style="font-size: 11.5px; color: rgba(255, 255, 255, 0.9); font-weight: 500;">
                            Products: ${formatPrice(productEscrow)} | Shipping: ${formatPrice(shippingEscrow)}
                        </div>
                        <div style="font-size: 11px; color: rgba(255, 255, 255, 0.8); margin-top: 6px; line-height: 1.4;">Locked until return intervals expire</div>
                    </div>

                    <!-- Box 2: Eligible Balance -->
                    <div style="background: linear-gradient(135deg, #1d4ed8, #3b82f6); border-radius: 14px; padding: 22px 24px; color: #ffffff; box-shadow: 0 8px 20px rgba(29, 78, 216, 0.22);">
                        <span style="font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: rgba(255, 255, 255, 0.85);">Eligible Balance</span>
                        <div style="font-size: 26px; font-weight: 800; color: #ffffff; margin: 4px 0 2px 0;">${formatPrice(eligiblePayout)}</div>
                        <div style="font-size: 11.5px; color: rgba(255, 255, 255, 0.9); font-weight: 500;">
                            Products: ${formatPrice(productEligible)} | Shipping: ${formatPrice(shippingEligible)}
                        </div>
                        <div style="font-size: 11px; color: rgba(255, 255, 255, 0.8); margin-top: 6px; line-height: 1.4;">Completed orders ready for manual weekly payment</div>
                    </div>
                </div>

                <h3 style="font-size:15px; font-weight:700; color:var(--primary); margin-bottom:15px;">Payout History</h3>
                
                <!-- Desktop Table -->
                <div class="table-responsive hide-mobile-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Payout Period</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th style="text-align: center;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${payouts.map((p, idx) => {
                const dateStr = new Date(p.created_at).toLocaleDateString();
                const rangeStr = `${new Date(p.period_start).toLocaleDateString()} - ${new Date(p.period_end).toLocaleDateString()}`;
                return `
                                    <tr>
                                        <td>${dateStr}</td>
                                        <td>${rangeStr}</td>
                                        <td style="font-weight:700; color:var(--primary);">${formatPrice(p.total_amount)}</td>
                                        <td><span class="badge ${p.status === 'paid' ? 'badge-completed' : 'badge-pending'}">${p.status}</span></td>
                                        <td style="text-align: center;">
                                            <button class="btn" style="padding: 4px 10px; font-size:11px; font-weight:600;" onclick="openPayoutDetailsCard(${idx})">Details</button>
                                        </td>
                                    </tr>
                                `;
            }).join('')}
                            ${payouts.length === 0 ? `
                                <tr>
                                    <td colspan="5" style="text-align:center; padding:20px 0; color:var(--text-light);">No historical payouts disbursed yet.</td>
                                </tr>
                            ` : ''}
                        </tbody>
                    </table>
                </div>

                <!-- Mobile Cards List -->
                <div class="show-mobile-cards">
                    ${payouts.map((p, idx) => {
                const dateStr = new Date(p.created_at).toLocaleDateString();
                const rangeStr = `${new Date(p.period_start).toLocaleDateString()} - ${new Date(p.period_end).toLocaleDateString()}`;
                return `
                            <div style="background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 14px; box-shadow: 0 2px 8px var(--shadow);">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                                    <span style="font-size: 12px; color: var(--text-light);">${dateStr}</span>
                                    <span class="badge ${p.status === 'paid' ? 'badge-completed' : 'badge-pending'}">${p.status}</span>
                                </div>
                                <div style="font-size: 18px; font-weight: 800; color: var(--primary); margin-bottom: 4px;">${formatPrice(p.total_amount)}</div>
                                <div style="font-size: 11.5px; color: var(--text-light); margin-bottom: 6px;">Period: ${rangeStr}</div>
                                <div style="display: flex; justify-content: flex-end; margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border);">
                                    <button class="btn" style="padding: 5px 12px; font-size: 11.5px; font-weight: 600;" onclick="openPayoutDetailsCard(${idx})">View Details</button>
                                </div>
                            </div>
                        `;
            }).join('')}
                    ${payouts.length === 0 ? `<div style="text-align:center; color:var(--text-light); padding:20px 0;">No historical payouts disbursed yet.</div>` : ''}
                </div>
            `;
        }

        function exportStatementCSV() {
            if (payouts.length === 0) {
                alert("No payouts available to export.");
                return;
            }
            let csv = "Date,Payout Period,Amount,Status\n";
            payouts.forEach(p => {
                const dateStr = new Date(p.created_at).toLocaleDateString();
                const rangeStr = `${new Date(p.period_start).toLocaleDateString()} - ${new Date(p.period_end).toLocaleDateString()}`;
                csv += `"${dateStr}","${rangeStr}",${p.total_amount},"${p.status}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', `${profile.shop_name.replace(/[^a-zA-Z0-9]/g, '_')}_payout_statement.csv`);
            window.URL.revokeObjectURL(url);
        }

        function openPayoutDetailsCard(index) {
            const p = payouts[index];
            if (!p) return;

            const dateStr = new Date(p.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
            const startStr = new Date(p.period_start).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
            const endStr = new Date(p.period_end).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });

            const modal = document.createElement('div');
            modal.className = "modal active";
            modal.style.display = "flex";
            modal.innerHTML = `
                <div class="modal-card" style="max-width: 480px; width: 100%;">
                    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 16px;">
                        <div>
                            <span style="font-size:11px; font-weight:700; color:var(--text-light); text-transform:uppercase; letter-spacing:0.5px;">Payout Details</span>
                            <h3 style="font-size:18px; font-weight:800; color:var(--primary); margin:2px 0 0 0;">${formatPrice(p.total_amount)}</h3>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span class="badge ${p.status === 'paid' ? 'badge-completed' : 'badge-pending'}">${p.status}</span>
                            <button style="background:none; border:none; font-size:20px; cursor:pointer; color:var(--text-light);" onclick="this.closest('.modal').remove()">✕</button>
                        </div>
                    </div>

                    <div style="display:flex; flex-direction:column; gap:10px; font-size:13px;">
                        <div style="display:flex; justify-content:space-between;">
                            <span style="color:var(--text-light);">Disbursement Date</span>
                            <span style="font-weight:600; color:var(--primary);">${dateStr}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between;">
                            <span style="color:var(--text-light);">Payout Settlement Period</span>
                            <span style="font-weight:600; color:var(--primary);">${startStr} – ${endStr}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between;">
                            <span style="color:var(--text-light);">Settlement Status</span>
                            <span style="font-weight:700; color:var(--primary);">${p.status === 'paid' ? 'Settled to Payout Account' : 'Pending Weekly Processing'}</span>
                        </div>
                    </div>

                    <div style="border-top: 1px solid var(--border); margin-top:16px; padding-top: 14px; display:flex; justify-content: flex-end;">
                        <button class="btn" style="padding: 6px 14px; font-size: 12px;" onclick="this.closest('.modal').remove()">Close</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        // ==========================================
        // 4F. TAB: CUSTOMER REVIEWS
        // ==========================================
        function renderReviewsTab(container) {
            container.innerHTML = `
                <div class="dashboard-header">
                    <h2 class="dashboard-title">Product Reviews</h2>
                </div>

                <div class="reviews-list" style="display: flex; flex-direction: column; gap: 15px;">
                    ${reviews.map(r => {
                const prod = products.find(p => p.id === r.product_id) || {};
                const prodName = prod.name || `Product ID #${r.product_id}`;
                const initials = (r.name || 'U').split(' ').map(n => n[0]).join('').substring(0, 2);
                return `
                            <div style="background: var(--secondary); border: 1px solid var(--border); border-radius: 12px; padding: 18px; display: flex; gap: 15px;">
                                <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--primary); color: #white; display: flex; align-items: center; justify-content: center; font-size:13px; font-weight:700; color:white; flex-shrink:0;">${initials}</div>
                                <div style="flex:1;">
                                    <div style="display:flex; justify-content:space-between; margin-bottom: 6px;">
                                        <div>
                                            <span style="font-weight:700; color:var(--primary); font-size:13px;">${escapeHtml(r.name)}</span>
                                            <span style="font-size:11px; color:var(--text-light); margin-left: 8px;">on product: <strong>${escapeHtml(prodName)}</strong></span>
                                        </div>
                                        <span style="font-size:11px; color:var(--text-light);">${new Date(r.created_at).toLocaleDateString()}</span>
                                    </div>
                                    <div style="color: var(--warning); font-size:14px; margin-bottom:6px;">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
                                    <p style="font-size:12.5px; color: var(--text); line-height: 1.5;">${escapeHtml(r.comment)}</p>
                                </div>
                            </div>
                        `;
            }).join('')}
                    ${reviews.length === 0 ? `
                        <div style="text-align:center; padding: 40px 0; color:var(--text-light); font-weight:600;">No reviews written for your items yet.</div>
                    ` : ''}
                </div>
            `;
        }

        // ==========================================
        // 4G. TAB: SHOP SETTINGS
        // ==========================================
        function renderSettingsTab(container) {
            container.innerHTML = `
                <div class="dashboard-header">
                    <h2 class="dashboard-title">Shop Settings</h2>
                </div>

                <form id="settingsForm" onsubmit="handleSettingsUpdate(event)">
                    <div class="form-group">
                        <label for="setShop">Shop Display Name *</label>
                        <input type="text" id="setShop" class="form-control" value="${escapeHtml(profile.shop_name)}" required placeholder="e.g. Trendy Collections">
                    </div>
                    <div class="form-group">
                        <label for="setPhone">Contact Phone Number *</label>
                        <input type="tel" id="setPhone" class="form-control" value="${escapeHtml(profile.phone)}" required placeholder="+92 300 1234567">
                    </div>
                    <div class="form-group">
                        <label for="setPayout">Payout Transfer Coordinates *</label>
                        <textarea id="setPayout" class="form-control" style="height: 100px; resize:none;" required placeholder="e.g. Bank Account: ...">${escapeHtml(profile.bank_account_details)}</textarea>
                        <span style="font-size:11px; color:var(--text-light); margin-top:4px; display:block;">Changing transfer coordinates will write an audit log entry for admin verification.</span>
                    </div>

                    <button type="submit" id="setSubmitBtn" class="btn-submit" style="margin-top: 15px; width: auto; padding:12px 30px;">Save Settings</button>
                </form>
            `;
        }

        async function handleSettingsUpdate(e) {
            e.preventDefault();
            const shopName = document.getElementById('setShop').value.trim();
            const phone = document.getElementById('setPhone').value.trim();
            const payoutDetails = document.getElementById('setPayout').value.trim();
            const btn = document.getElementById('setSubmitBtn');

            btn.innerHTML = `<span class="spinner"></span> Saving...`;
            btn.classList.add('loading');

            try {
                const { error } = await supabaseClient
                    .from('profiles')
                    .update({
                        shop_name: shopName,
                        phone: phone,
                        bank_account_details: payoutDetails
                    })
                    .eq('id', user.id);

                if (error) throw error;

                alert("Settings saved successfully!");
                await fetchProfile();
                renderTabContent();
            } catch (err) {
                alert("Failed to save settings: " + err.message);
                btn.innerHTML = `Save Settings`;
                btn.classList.remove('loading');
            }
        }

        // Initialize App on DOM Content Loaded
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>

</html>
