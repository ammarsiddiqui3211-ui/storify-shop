<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storify Seller Portal</title>
    <link rel="icon" type="image/png" href="images/favicon/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        html {
            scrollbar-gutter: stable;
            max-width: 100%;
            overflow-x: clip;
        }

        :root {
            --primary: #1a1a2e;
            --secondary: #f0f4f8;
            --accent: #4A90E2;
            --accent-dark: #357ABD;
            --accent-light: #6BA8F0;
            --accent-glow: rgba(74, 144, 226, 0.15);
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --white: #ffffff;
            --shadow: rgba(30, 41, 59, 0.05);
            --shadow-strong: rgba(30, 41, 59, 0.1);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background: var(--secondary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-weight: 400;
            max-width: 100%;
            overflow-x: clip;
        }

        /* Global font-weight override: use regular/medium instead of bold */
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-weight: 500 !important;
        }

        *:not(h1):not(h2):not(h3):not(h4):not(h5):not(h6) {
            font-weight: 400 !important;
        }

        /* Top Bar & Header */
        .header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
            height: 70px;
            display: flex;
            align-items: center;
        }

        .header-container {
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo img {
            height: 38px;
        }

        .header-title-badge {
            margin-left: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .user-nav {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-link {
            color: var(--text-light);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .nav-link:hover {
            color: var(--primary);
        }

        .btn-signout {
            background: none;
            border: 1.5px solid var(--border);
            padding: 8px 16px;
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-signout:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(239, 68, 68, 0.05);
        }

        /* Desktop Profile Hover Dropdown */
        .seller-profile-container {
            position: relative;
            display: inline-block;
        }

        .seller-profile-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--secondary);
            border: 1.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .seller-profile-avatar:hover {
            border-color: var(--accent);
            background: var(--white);
        }

        .seller-profile-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            width: 220px;
            padding: 12px 0;
            display: none;
            flex-direction: column;
            z-index: 1010;
            margin-top: 8px;
        }

        /* Invisible bridge to prevent hover loss over the margin gap */
        .seller-profile-dropdown::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 0;
            right: 0;
            height: 10px;
            background: transparent;
        }

        /* Show on hover of container */
        .seller-profile-container:hover .seller-profile-dropdown {
            display: flex;
        }

        .profile-dropdown-info {
            padding: 4px 16px 8px;
        }

        .profile-shop-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 2px;
        }

        .profile-email {
            font-size: 12px;
            color: var(--text-light);
        }

        .seller-profile-dropdown a {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            color: var(--text);
            text-decoration: none;
            font-size: 13.5px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .seller-profile-dropdown a:hover {
            background: var(--secondary);
            color: var(--danger);
        }

        /* Color Picker Inputs to Circular Shape */
        input[type="color"] {
            width: 38px !important;
            height: 38px !important;
            border: 1.5px solid var(--border) !important;
            border-radius: 50% !important;
            overflow: hidden !important;
            padding: 0 !important;
            cursor: pointer;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0 !important;
        }

        input[type="color"]::-webkit-color-swatch {
            border: none !important;
            border-radius: 50% !important;
        }

        input[type="color"]::-moz-color-swatch {
            border: none !important;
            border-radius: 50% !important;
        }

        /* Mobile Hamburger Button */
        .hamburger-mobile {
            display: none;
            background: none;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 40px;
            height: 40px;
            gap: 4px;
            padding: 0;
            transition: all 0.2s ease;
        }

        .hamburger-mobile span {
            display: block !important;
            width: 18px;
            height: 2px;
            background: var(--text) !important;
            border-radius: 2px;
            transition: all 0.2s ease;
        }

        .hamburger-mobile:hover {
            background: var(--secondary);
            border-color: var(--accent);
        }

        .hamburger-mobile:hover span {
            background: var(--accent) !important;
        }

        /* Mobile Slide-out Menu styling */
        .mobile-menu {
            display: none;
            position: fixed;
            top: 0;
            right: -100%;
            width: 300px;
            height: 100vh;
            background: var(--white);
            z-index: 3000;
            padding: 12px 16px 24px;
            transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -4px 0 30px rgba(0, 0, 0, 0.15);
            overflow-y: auto;
        }

        .mobile-menu.active {
            display: block;
            right: 0;
        }

        .mobile-menu-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .mobile-menu-overlay.active {
            display: block;
            opacity: 1;
            visibility: visible;
        }

        .mobile-menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .mobile-menu-header img {
            height: 32px;
        }

        .close-mobile-menu {
            background: none;
            border: none;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: background 0.3s ease;
            padding: 4px;
        }

        .close-mobile-menu span {
            display: block !important;
            width: 22px;
            height: 2px;
            background: var(--text) !important;
            border-radius: 2px;
            margin-bottom: 5px;
        }

        .close-mobile-menu span:last-child {
            margin-bottom: 0;
        }

        .close-mobile-menu:hover {
            background: var(--secondary);
        }

        .mobile-nav-links {
            list-style: none;
            margin-bottom: 12px;
        }

        .mobile-nav-links li {
            border-bottom: 1px solid var(--border);
        }

        .mobile-nav-links a {
            display: block;
            padding: 12px 0;
            color: var(--text);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .mobile-nav-links a:hover,
        .mobile-nav-links a.active {
            color: var(--accent);
        }

        /* Views Layout */
        .main-content {
            flex: 1;
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        /* 1. Auth View Styles */
        .auth-container {
            max-width: 450px;
            width: 100%;
            margin: 0 auto;
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 10px 30px var(--shadow-strong);
            padding: 40px;
            border: 1px solid var(--border);
        }

        .auth-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 8px;
            text-align: center;
        }

        .auth-subtitle {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 24px;
            text-align: center;
        }

        .auth-tabs {
            display: flex;
            border-bottom: 2px solid var(--border);
            margin-bottom: 24px;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .auth-tab.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            margin-bottom: -2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text);
            transition: all 0.2s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .password-input-wrapper {
            position: relative;
        }

        .password-toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        .auth-message {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            align-items: flex-start;
            gap: 10px;
        }

        .auth-message.error {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #b91c1c;
            display: flex;
        }

        .auth-message.success {
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #047857;
            display: flex;
        }

        /* Spinner */
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--white);
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 2. Registration View & holding screen */
        .card-panel {
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 1px solid var(--border);
            padding: 30px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-desc {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .holding-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
            background: var(--white);
            border-radius: 16px;
            padding: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px var(--shadow);
        }

        .holding-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
        }

        /* 3. Approved Dashboard Layout */
        .dashboard-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            min-height: calc(100vh - 150px);
        }

        .sidebar {
            width: 250px;
            flex-shrink: 0;
            background: var(--white);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 4px 20px var(--shadow);
            position: sticky;
            top: 90px;
            align-self: flex-start;
            z-index: 100;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sidebar-item:hover {
            background: rgba(37, 99, 235, 0.08);
            color: #2563eb;
        }

        .sidebar-item.active {
            background: linear-gradient(135deg, #1d4ed8, #2563eb);
            color: var(--white);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .sidebar-item-badge {
            margin-left: auto;
            background: var(--danger);
            color: var(--white);
            font-size: 10px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 100px;
        }

        .dashboard-content {
            flex: 1;
            background: var(--white);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 30px;
            box-shadow: 0 4px 20px var(--shadow);
            min-height: 500px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1.5px solid var(--border);
        }

        .dashboard-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
        }

        /* Stat Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--secondary);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .stat-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            line-height: 1.2;
        }

        .stat-subtext {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 6px;
        }

        /* Money Timeline Widget */
        .money-widget {
            border-radius: 12px;
            border: 1.5px solid var(--border);
            padding: 24px;
            background: linear-gradient(135deg, var(--white) 0%, var(--secondary) 100%);
            margin-bottom: 30px;
        }

        .widget-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .money-timeline {
            display: grid;
            grid-template-columns: 1fr auto 1.2fr auto 1fr;
            align-items: center;
            gap: 15px;
        }

        .timeline-step {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            box-shadow: 0 4px 10px var(--shadow);
            text-align: center;
        }

        .timeline-step.escrow {
            border: 2px solid var(--accent);
        }

        .timeline-step.eligible {
            border: 2px solid var(--warning);
        }

        .timeline-step.paid {
            border: 2px solid var(--success);
        }

        .timeline-arrow {
            color: var(--text-light);
            font-size: 20px;
            font-weight: 700;
            display: flex;
            justify-content: center;
        }

        /* Products, Orders, Tables & Lists */
        .table-responsive {
            overflow-x: auto;
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: var(--secondary);
            color: var(--text-light);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            padding: 12px 10px;
            border-bottom: 1.5px solid var(--border);
            text-align: left;
        }

        td {
            padding: 14px 10px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            vertical-align: middle;
        }

        tr:hover td {
            background: rgba(240, 244, 248, 0.3);
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }

        .badge-pending {
            background: #fff8e1;
            color: #b78103;
        }

        .badge-escrow {
            background: #e3f2fd;
            color: #0d47a1;
        }

        .badge-shipped {
            background: #e8f5e9;
            color: #1b5e20;
        }

        .badge-return {
            background: #f3e5f5;
            color: #4a148c;
        }

        .badge-completed {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .badge-disputed {
            background: #ffebee;
            color: #c62828;
            border: 1px solid rgba(198, 40, 40, 0.2);
        }

        .badge-refunded {
            background: #ffebee;
            color: #b71c1c;
        }

        /* Filters and Actions Bar */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border: 1.5px solid var(--border);
            background: var(--white);
            color: var(--text);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn:hover {
            border-color: var(--text-light);
            background: var(--secondary);
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
            border: none;
        }

        .btn-primary:hover {
            background: #101020;
        }

        .btn-danger {
            background: none;
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.05);
            border-color: var(--danger);
        }

        /* Image preview upload */
        .image-preview-box {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid var(--border);
        }

        /* Details list */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .details-item {
            background: var(--secondary);
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
        }

        .details-lbl {
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 4px;
        }

        .details-val {
            font-weight: 600;
            color: var(--primary);
        }

        /* Modal Slip View */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.6);
            backdrop-filter: blur(5px);
            z-index: 1100;
            display: flex;
            align-items: center;
            justify-content: center;

    <script>
        // Supabase Client Initialization
        const SUPABASE_URL = "https://goguiruuirltoiofmvuj.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvZ3VpcnV1aXJsdG9pb2ZtdnVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMDU4MTYsImV4cCI6MjA5ODY4MTgxNn0.N8BCHCsDet0Bpxhe7P9iK0U6vs6NbsChdgNEI8OAFzc";
        let supabaseClient = null;

        if (window.supabase) {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        // State variables
        let user = null;
        let profile = null;
        let currentTab = 'overview';
        let authTab = 'login';
        let showAuthForm = false;
        let products = [];
        let orderItems = [];
        let payouts = [];
        let reviews = [];

        // Global variables for Add Product variant builders
        let addedProductTitle = '';
        let addedProductCategory = 'Apparel & Fashion';
        let addedProductPrice = '';
        let addedProductOriginalPrice = '';
        let addedProductShippingFee = '250';
        let addedProductDescription = '';
        let addedSpecs = {};
        let addedColors = [];
        let addedSizes = [];
        let selectedImageFiles = [];
        let tempColorPicker = '#4a90e2';
        let tempColorHex = '';

        // Save state to sessionStorage
        function saveAddProductState() {
            try {
                const picker = document.getElementById('colorPicker');
                const hex = document.getElementById('colorHex');
                if (picker) tempColorPicker = picker.value;
                if (hex) tempColorHex = hex.value;

                const state = {
                    title: addedProductTitle,
                    category: addedProductCategory,
                    price: addedProductPrice,
                    originalPrice: addedProductOriginalPrice,
                    shippingFee: addedProductShippingFee,
                    description: addedProductDescription,
                    specs: addedSpecs,
                    colors: addedColors,
                    sizes: addedSizes,
                    tempColorPicker: tempColorPicker,
                    tempColorHex: tempColorHex
                };
                sessionStorage.setItem('addProductState', JSON.stringify(state));
            } catch (e) {
                console.error("Failed to save add product state:", e);
            }
        }

        // Load state from sessionStorage
        function loadAddProductState() {
            try {
                const saved = sessionStorage.getItem('addProductState');
                if (saved) {
                    const state = JSON.parse(saved);
                    addedProductTitle = state.title || '';
                    addedProductCategory = state.category || 'Apparel & Fashion';
                    addedProductPrice = state.price || '';
                    addedProductOriginalPrice = state.originalPrice || '';
                    addedProductShippingFee = state.shippingFee || '250';
                    addedProductDescription = state.description || '';
                    addedSpecs = state.specs || {};
                    addedColors = state.colors || [];
                    addedSizes = state.sizes || [];
                    tempColorPicker = state.tempColorPicker || '#4a90e2';
                    tempColorHex = state.tempColorHex || '';
                }
            } catch (e) {
                console.error("Failed to load add product state:", e);
            }
        }

        // Clear state on successful list
        function clearAddProductState() {
            addedProductTitle = '';
            addedProductCategory = 'Apparel & Fashion';
            addedProductPrice = '';
            addedProductOriginalPrice = '';
            addedProductShippingFee = '250';
            addedProductDescription = '';
            addedSpecs = {};
            addedColors = [];
            addedSizes = [];
            selectedImageFiles = [];
            tempColorPicker = '#4a90e2';
            tempColorHex = '';
            try {
                sessionStorage.removeItem('addProductState');
            } catch (e) {
                console.error("Failed to clear add product state:", e);
            }
        }

        // Bulk selection list for products
        let selectedProductIds = [];

        // State variables for editing products
        let editingProduct = null;
        let editingImageUrls = [];
        let editingNewFiles = [];
        let editingColors = [];
        let editingSizes = [];
        let editingSpecs = {};
        let editingTempColorPicker = '#4a90e2';
        let editingTempColorHex = '';

        function handleLogoClick(event) {
            if (user && profile && profile.seller_status === 'approved') {
                event.preventDefault();
                switchTab('overview');
            }
        }

        // Initialize Application
        async function initApp() {
            loadAddProductState();
            if (!supabaseClient) {
                document.getElementById('loadingState').innerHTML = `<p style="color:var(--danger)">Supabase failed to initialize. Please check configurations.</p>`;
                return;
            }

            try {
                // Restore/Listen to auth state
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    user = session.user;
                    await fetchProfile();
                } else {
                    user = null;
                    profile = null;
                }

                // Setup auth change listener
                supabaseClient.auth.onAuthStateChange(async (event, session) => {
                    try {
                        if (session) {
                            user = session.user;
                            await fetchProfile();
                        } else {
                            user = null;
                            profile = null;
                            products = [];
                            orderItems = [];
                            payouts = [];
                            reviews = [];
                            showAuthForm = false; // Reset to landing page on logout
                        }
                        renderView();
                    } catch (innerErr) {
                        console.error("Auth change error:", innerErr);
                    }
                });
            } catch (err) {
                console.warn("localStorage/Supabase access error (likely file:// origin restrictions):", err);
                user = null;
                profile = null;
            }

            renderView();
        }


        async function fetchProfile() {
            if (!user) return;
            try {
                const { data, error } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .eq('id', user.id)
                    .single();
                if (!error && data) {
                    profile = data;
                    if (profile.role === 'seller' && profile.seller_status === 'approved') {
                        await loadDashboardData();
                    }
                } else {
                    console.warn("Profile not found or error, attempting to auto-create profile:", error);
                    // Try to insert a default profile if it's missing (e.g. database reset)
                    const { data: newProfile, error: insertError } = await supabaseClient
                        .from('profiles')
                        .insert({
                            id: user.id,
                            role: 'buyer',
                            seller_status: 'none',
                            seller_score: 100,
                            name: user.user_metadata?.name || '',
                            phone: user.user_metadata?.phone || '',
                            address: user.user_metadata?.address || '',
                            city: user.user_metadata?.city || '',
                            zip: user.user_metadata?.zip || ''
                        })
                        .select()
                        .single();

                    if (!insertError && newProfile) {
                        profile = newProfile;
                    } else {
                        console.error("Failed to auto-create profile:", insertError);
                    }
                }
            } catch (err) {
                console.error("Error fetching user profile:", err);
            }
        }

        async function loadDashboardData() {
            if (!user) return;
            try {
                // Fetch Products
                const { data: prods } = await supabaseClient
                    .from('products')
                    .select('*')
                    .eq('seller_id', user.id)
                    .order('created_at', { ascending: false });
                products = prods || [];

                // Fetch Order Items
                const { data: items } = await supabaseClient
                    .from('order_items')
                    .select(`
                        id,
                        quantity,
                        price_at_purchase,
                        item_status,
                        created_at,
                        order_id,
                        product_id,
                        orders (
                            order_ref,
                            shipping_address,
                            shipping_name,
                            shipping_phone,
                            shipping_email
                        )
                    `)
                    .eq('seller_id', user.id)
                    .order('created_at', { ascending: false });
                orderItems = items || [];

                // Fetch Payouts
                const { data: pays } = await supabaseClient
                    .from('payouts')
                    .select('*')
                    .eq('seller_id', user.id)
                    .order('created_at', { ascending: false });
                payouts = pays || [];

                // Fetch Reviews of products
                const { data: revs } = await supabaseClient
                    .from('reviews')
                    .select(`
                        id,
                        name,
                        rating,
                        comment,
                        created_at,
                        product_id
                    `)
                    .order('created_at', { ascending: false });

                // Client-side filter reviews matching seller's products
                const prodIds = products.map(p => p.id);
                reviews = (revs || []).filter(r => prodIds.includes(r.product_id));

            } catch (err) {
                console.error("Error loading dashboard data:", err);
            }
        }

        // Render main view based on state
        function renderView() {
            updateHeaderNav();
            const container = document.getElementById('mainContent');
            if (!container) return;

            // 1. Not Authenticated State
            if (!user) {
                if (showAuthForm) {
                    renderAuthView(container);
                } else {
                    renderLandingView(container);
                }
                return;
            }

            // 2. Logged In, but role not seller or status 'none'
            if (!profile || (profile.role !== 'seller' || profile.seller_status === 'none')) {
                renderRegistrationView(container);
                return;
            }

            // 3. Logged In, status 'rejected'
            if (profile && profile.seller_status === 'rejected') {
                renderRejectedView(container);
                return;
            }

            // 4. Logged In, status 'suspended'
            if (profile && profile.seller_status === 'suspended') {
                renderSuspendedView(container);
                return;
            }

            // 5. Logged In, status 'pending'
            if (profile && profile.seller_status === 'pending') {
                renderPendingView(container);
                return;
            }

            // 6. Logged In, status 'approved'
            if (profile && profile.seller_status === 'approved') {
                renderDashboardLayout(container);
                return;
            }
        }

        function updateHeaderNav() {
            const nav = document.getElementById('userNav');
            const mobileLinks = document.getElementById('mobileNavLinks');
            if (!nav) return;

            if (user) {
                const displayName = profile?.shop_name || profile?.name || user.email;
                nav.innerHTML = `
                    <div class="seller-profile-container">

                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>

                            <a href="#" onclick="signOutUser(); event.preventDefault();">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>

                        <span></span>
                        <span></span>
                        <span></span>

                `;

                if (mobileLinks) {
                    mobileLinks.innerHTML = `
                        <li><a href="#" onclick="toggleMobileMenu(); switchTab('overview'); event.preventDefault();">Dashboard</a></li>
                        <li><a href="#" onclick="toggleMobileMenu(); switchTab('add-product'); event.preventDefault();">Add Product</a></li>
                        <li><a href="#" onclick="toggleMobileMenu(); switchTab('manage'); event.preventDefault();">Manage Listing</a></li>
                        <li><a href="#" onclick="toggleMobileMenu(); switchTab('orders'); event.preventDefault();">Customer Orders</a></li>
                        <li><a href="#" onclick="toggleMobileMenu(); switchTab('earnings'); event.preventDefault();">Earnings</a></li>
                        <li><a href="#" onclick="toggleMobileMenu(); switchTab('reviews'); event.preventDefault();">Customer Reviews</a></li>
                        <li><a href="#" onclick="toggleMobileMenu(); switchTab('settings'); event.preventDefault();">Shop Settings</a></li>
                        <li><a href="#" onclick="toggleMobileMenu(); signOutUser(); event.preventDefault();" style="color: #ef4444;">Logout</a></li>
                    `;
                }
            } else {
                nav.innerHTML = `
                    <a href="index.html" class="nav-link">Main Storefront</a>
                `;
                if (mobileLinks) {
                    mobileLinks.innerHTML = `
                        <li><a href="index.html" onclick="toggleMobileMenu()">Main Storefront</a></li>
                    `;
                }
            }
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            const overlay = document.getElementById('mobileMenuOverlay');
            if (menu && overlay) {
                const isActive = menu.classList.contains('active');
                if (isActive) {
                    menu.classList.remove('active');
                    overlay.classList.remove('active');
                    setTimeout(() => {
                        menu.style.display = 'none';
                        overlay.style.display = 'none';
                    }, 350);
                } else {
                    menu.style.display = 'block';
                    overlay.style.display = 'block';
                    menu.offsetHeight; // force reflow
                    overlay.offsetHeight;
                    menu.classList.add('active');
                    overlay.classList.add('active');
                }
            }
        }

        function toggleSellerMenu(event) {
            if (event) event.stopPropagation();
            const dropdown = document.getElementById('sellerMenuDropdown');
            if (dropdown) {
                const isActive = dropdown.classList.contains('active');
                if (isActive) {
                    dropdown.classList.remove('active');
                    setTimeout(() => { dropdown.style.display = 'none'; }, 200);
                } else {
                    dropdown.style.display = 'flex';
                    dropdown.offsetHeight; // trigger reflow
                    dropdown.classList.add('active');
                }
            }
        }

        function switchSellerTab(tabId, event) {
            if (event) event.preventDefault();
            switchTab(tabId);
            const dropdown = document.getElementById('sellerMenuDropdown');
            if (dropdown) {
                dropdown.classList.remove('active');
                setTimeout(() => { dropdown.style.display = 'none'; }, 200);
            }
        }

        // Close dropdown when clicking anywhere else
        window.addEventListener('click', () => {
            const dropdown = document.getElementById('sellerMenuDropdown');
            if (dropdown && dropdown.classList.contains('active')) {
                dropdown.classList.remove('active');
                setTimeout(() => { dropdown.style.display = 'none'; }, 200);
            }
        });

        async function signOutUser() {
            if (supabaseClient) {
                await supabaseClient.auth.signOut();
            }
        }

        // Escape HTML to prevent XSS
        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatPrice(num) {
            return "Rs " + Number(num).toLocaleString('en-US');
        }

        function renderLandingView(container) {
            container.innerHTML = `
                <div style="max-width: 800px; margin: 0 auto; text-align: center; padding: 40px 20px;">
                    <div class="landing-hero-card">
                        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 80% 20%, rgba(74, 144, 226, 0.15) 0%, transparent 60%); pointer-events: none;"></div>
                        <h1>Start Your Selling Journey on Storify</h1>
                        <p>

        async function handleAuthSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            const btn = document.getElementById('authSubmitBtn');
            const alertBox = document.getElementById('authAlert');

            if (btn.classList.contains('loading')) return;
            btn.innerHTML = `<span class="spinner"></span> Working...`;
            btn.classList.add('loading');
            alertBox.style.display = 'none';

            try {
                if (authTab === 'login') {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                } else {
                    const name = document.getElementById('authName').value.trim();
                    const phone = document.getElementById('authPhone').value.trim();

                    const { data, error } = await supabaseClient.auth.signUp({
                        email,
                        password,
                        options: {
                            data: { name, phone }
                        }
                    });
                    if (error) throw error;

                    if (data.user && !data.session) {
                        alertBox.className = "auth-message success";
                        alertBox.innerHTML = `Sign up complete! Please check your email to verify your registration.`;
                        alertBox.style.display = 'flex';
                        btn.innerHTML = `Create Seller Account`;
                        btn.classList.remove('loading');
                        return;
                    }
                }
            } catch (err) {
                alertBox.className = "auth-message error";
                alertBox.innerHTML = `<strong>Error:</strong> ${escapeHtml(err.message)}`;
                alertBox.style.display = 'flex';
                btn.innerHTML = authTab === 'login' ? 'Sign In' : 'Create Seller Account';
                btn.classList.remove('loading');
            }
        }

        // ==========================================
        // 4A. TAB: OVERVIEW / DASHBOARD HOME
        // ==========================================
        function renderOverviewTab(container) {
            // Calculations
            const now = new Date();
            const startOfWeek = new Date(now.setDate(now.getDate() - now.getDay()));
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);

            const thisWeeksOrders = orderItems.filter(item => new Date(item.created_at) >= startOfWeek).length;
            const thisMonthsOrders = orderItems.filter(item => new Date(item.created_at) >= startOfMonth).length;

            const pendingOrders = orderItems.filter(item => ['pending_payment', 'paid_escrow', 'shipped', 'delivered', 'return_window', 'disputed'].includes(item.item_status)).length;
            const completedOrders = orderItems.filter(item => item.item_status === 'completed').length;

            // Top Product Calculation
            const prodCounts = {};
            orderItems.forEach(item => {
                if (item.product_id) {
                    prodCounts[item.product_id] = (prodCounts[item.product_id] || 0) + Number(item.quantity);
                }
            });
            let topProductId = null;
            let maxCount = 0;
            for (const [id, count] of Object.entries(prodCounts)) {
                if (count > maxCount) {
                    maxCount = count;
                    topProductId = Number(id);
                }
            }
            const topProduct = products.find(p => p.id === topProductId)?.name || 'N/A';

            // Money timeline calculations (group by order_id for per-seller per-order shipping fee)
            const itemsByOrder = {};
            orderItems.forEach(item => {
                if (!itemsByOrder[item.order_id]) {
                    itemsByOrder[item.order_id] = [];
                }
                itemsByOrder[item.order_id].push(item);
            });

            let productEscrow = 0;
            let shippingEscrow = 0;
            let productEligible = 0;
            let shippingEligible = 0;

            Object.entries(itemsByOrder).forEach(([orderId, items]) => {
                let orderProductEscrow = 0;
                let orderProductEligible = 0;
                let maxShippingFee = 0;
                let hasEscrowItems = false;
                let allItemsCompleted = true;
                let isAlreadyReleased = false;

                items.forEach(item => {
                    const itemAmt = Number(item.price_at_purchase) * Number(item.quantity);
                    const itemShipping = Number(item.shipping_fee_at_purchase || 0);
                    if (itemShipping > maxShippingFee) {
                        maxShippingFee = itemShipping;
                    }

                    if (['paid_escrow', 'shipped', 'return_window', 'disputed', 'delivered'].includes(item.item_status)) {
                        orderProductEscrow += itemAmt;
                        hasEscrowItems = true;
                        allItemsCompleted = false;
                    } else if (item.item_status === 'completed') {
                        if (!item.payout_released) {
                            orderProductEligible += itemAmt;
                        } else {
                            isAlreadyReleased = true;
                        }
                    } else {
                        allItemsCompleted = false;
                    }
                });

                productEscrow += orderProductEscrow;
                productEligible += orderProductEligible;

                if (hasEscrowItems) {
                    shippingEscrow += maxShippingFee;
                } else if (allItemsCompleted && !isAlreadyReleased && items.length > 0) {
                    shippingEligible += maxShippingFee;
                }
            });

            const inEscrow = productEscrow + shippingEscrow;
            const eligiblePayout = productEligible + shippingEligible;

        function toggleSize(size, checked) {
            if (checked) {

            } else {
                addedSizes = addedSizes.filter(s => s !== size);
            }
            saveAddProductState();
        }

        function addSpec() {
            const kInput = document.getElementById('specKey');
            const vInput = document.getElementById('specVal');
            const key = kInput.value.trim();
            const val = vInput.value.trim();

            if (key && val) {
                addedSpecs[key] = val;
                kInput.value = '';
                vInput.value = '';
                saveAddProductState();
                renderSpecs();
            }
        }

        function removeSpec(key) {
            delete addedSpecs[key];
            saveAddProductState();
            renderSpecs();
        }

        function renderSpecs() {
            const container = document.getElementById('specsList');
            if (container) {
                container.innerHTML = Object.entries(addedSpecs).map(([k, v]) => `
                    <div style="display: flex; justify-content: space-between; background: var(--secondary); padding: 8px 12px; border-radius: 6px; font-size: 12px;">
                        <span><strong>${escapeHtml(k)}:</strong> ${escapeHtml(v)}</span>
                        <span onclick="removeSpec('${k}')" style="cursor: pointer; color: var(--danger); font-weight: 700;">Delete</span>
                    </div>

        async function handleProductSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('prodName').value.trim();
            const categorySelect = document.getElementById('prodCategory');
            const category = categorySelect.value;
            const categoryKey = categorySelect.options[categorySelect.selectedIndex].getAttribute('data-key');
            const price = Number(document.getElementById('prodPrice').value);
            const originalPrice = Number(document.getElementById('prodOriginalPrice').value) || null;
            const shippingFee = Number(document.getElementById('prodShippingFee').value) || 250;
            const description = document.getElementById('prodDescription').value.trim();
            const btn = document.getElementById('addProdSubmitBtn');

            if (selectedImageFiles.length === 0) {
                alert("Please upload at least 1 image");
                return;
            }

            btn.innerHTML = `<span class="spinner"></span> Listing Product...`;
            btn.classList.add('loading');

            try {
                // 1. Upload Images to product-images storage bucket
                const imageUrls = [];
                for (const file of selectedImageFiles) {
                    const cleanFileName = `${Date.now()}_${Math.floor(Math.random() * 1000)}_${file.name.replace(/[^a-zA-Z0-9.]/g, '')}`;
                    const filePath = `${user.id}/${cleanFileName}`;

                    const { data, error } = await supabaseClient.storage
                        .from('product-images')
                        .upload(filePath, file);

                    if (error) throw error;

                    const { data: { publicUrl } } = supabaseClient.storage
                        .from('product-images')
                        .getPublicUrl(filePath);

                    imageUrls.push(publicUrl);
                }

                // 2. Insert product row in Supabase
                const { error: insertError } = await supabaseClient
                    .from('products')
                    .insert([{
                        name: name,
                        category: category,
                        category_key: categoryKey,
                        price: price,
                        original_price: originalPrice,
                        shipping_fee: shippingFee,
                        description: description,
                        images: imageUrls,
                        colors: addedColors.length ? addedColors : null,
                        sizes: addedSizes.length ? addedSizes : null,
                        specs: addedSpecs,
                        seller_id: user.id
                    }]);

                if (insertError) throw insertError;

                alert("Product listed successfully!");
                clearAddProductState();
                await loadDashboardData();
                switchTab('manage');
            } catch (err) {
                alert("Failed to list product: " + err.message);
                btn.innerHTML = `List Product`;
                btn.classList.remove('loading');
            }
        }

            renderTabContent();
        }

        function toggleSelectProduct(id, checked) {
            if (checked) {
                if (!selectedProductIds.includes(id)) selectedProductIds.push(id);
            } else {
                selectedProductIds = selectedProductIds.filter(pid => pid !== id);
            }
            const bulkGroup = document.getElementById('bulkActionsGroup');
            if (bulkGroup) bulkGroup.style.display = selectedProductIds.length > 0 ? 'flex' : 'none';
            renderTabContent();
        }

        function toggleSelectAllProducts(checked) {
            if (checked) {
                selectedProductIds = products.map(p => p.id);
            } else {
                selectedProductIds = [];
            }
            const bulkGroup = document.getElementById('bulkActionsGroup');
            if (bulkGroup) bulkGroup.style.display = selectedProductIds.length > 0 ? 'flex' : 'none';
            renderTabContent();
        }

        async function updateProductStockStatus(prodId, status) {
            try {
                const { error } = await supabaseClient
                    .from('products')
                    .update({ stock_status: status })
                    .eq('id', prodId);

                if (error) throw error;
                await loadDashboardData();
                renderTabContent();
            } catch (err) {
                alert("Failed to update status: " + err.message);
            }
        }

        async function deleteSingleProduct(prodId) {
            if (!confirm("Are you sure you want to delete this listing?")) return;
            try {
                const { error } = await supabaseClient
                    .from('products')
                    .delete()
                    .eq('id', prodId);

                if (error) throw error;
                await loadDashboardData();
                renderTabContent();
            } catch (err) {
                alert("Failed to delete product: " + err.message);
            }
        }

        async function handleBulkAction(action) {
            if (!action || selectedProductIds.length === 0) return;

            if (action === 'delete') {
                if (!confirm(`Are you sure you want to delete ${selectedProductIds.length} listings?`)) return;
                try {
                    const { error } = await supabaseClient
                        .from('products')
                        .delete()
                        .in('id', selectedProductIds);

                    if (error) throw error;
                    alert("Listings deleted!");
                } catch (err) {
                    alert("Bulk delete failed: " + err.message);
                }
            } else if (action === 'edit_shipping') {
                const newFeeStr = prompt("Enter new shipping fee (PKR) for selected listings:", "250");
                if (newFeeStr === null) return;
                const newFee = Number(newFeeStr);
                if (isNaN(newFee) || newFee < 0) {
                    alert("Invalid shipping fee entered.");
                    return;
                }
                try {
                    const { error } = await supabaseClient
                        .from('products')
                        .update({ shipping_fee: newFee })
                        .in('id', selectedProductIds);

                    if (error) throw error;
                    alert("Shipping fees updated successfully!");
                } catch (err) {
                    alert("Bulk shipping update failed: " + err.message);
                }
            } else {
                try {
                    const { error } = await supabaseClient
                        .from('products')
                        .update({ stock_status: action })
                        .in('id', selectedProductIds);

                    if (error) throw error;
                } catch (err) {
                    alert("Bulk update failed: " + err.message);
                }
            }

            selectedProductIds = [];
            await loadDashboardData();
            renderTabContent();
        }

        function renderEditExistingImages() {
            const container = document.getElementById('editExistingImagePreviews');

            if (editingImageUrls.length === 0) {

        function renderEditNewImages() {
            const container = document.getElementById('editNewImagePreviews');

                reader.onload = (e) => {
                    const div = document.createElement('div');
                    div.style.position = 'relative';

        function addEditColor() {
            const picker = document.getElementById('editColorPicker');
            const hex = document.getElementById('editColorHex');
            const color = hex.value.trim() || picker.value;

            if (color && !editingColors.includes(color)) {
                editingColors.push(color);
                hex.value = '';
                editingTempColorHex = '';
                renderEditColors();

        function addEditColorFromPicker(val) {
            if (val && !editingColors.includes(val)) {

                renderEditColors();

                if (hexInput) hexInput.value = editingTempColorHex;
            }

        function syncEditColorPicker(val) {
            editingTempColorHex = val;
            if (val.startsWith('#') && val.length === 7) {
                const picker = document.getElementById('editColorPicker');
                if (picker) {
                    picker.value = val;
                    editingTempColorPicker = val;

        function addEditSpec() {
            const kInput = document.getElementById('editSpecKey');

        async function handleProductUpdate(e) {
            e.preventDefault();
            if (!editingProduct) return;

            const name = document.getElementById('editProdName').value.trim();
            const categorySelect = document.getElementById('editProdCategory');
            const category = categorySelect.value;
            const categoryKey = categorySelect.options[categorySelect.selectedIndex].getAttribute('data-key');
            const price = Number(document.getElementById('editProdPrice').value);
            const originalPrice = Number(document.getElementById('editProdOriginalPrice').value) || null;
            const shippingFee = Number(document.getElementById('editProdShippingFee').value) || 250;
            const description = document.getElementById('editProdDescription').value.trim();
            const btn = document.getElementById('editProdSubmitBtn');

            const totalImagesCount = editingImageUrls.length + editingNewFiles.length;
            if (totalImagesCount === 0) {
                alert("Please upload at least 1 image");
                return;
            }
            if (totalImagesCount > 5) {
                alert("You can have a maximum of 5 images");
                return;
            }

            btn.innerHTML = `<span class="spinner"></span> Saving Changes...`;
            btn.classList.add('loading');

            try {
                // 1. Upload new Images if any
                const newUploadedUrls = [];
                for (const file of editingNewFiles) {
                    const cleanFileName = `${Date.now()}_${Math.floor(Math.random() * 1000)}_${file.name.replace(/[^a-zA-Z0-9.]/g, '')}`;
                    const filePath = `${user.id}/${cleanFileName}`;

                    const { data, error } = await supabaseClient.storage
                        .from('product-images')
                        .upload(filePath, file);

                    if (error) throw error;

                    const { data: { publicUrl } } = supabaseClient.storage
                        .from('product-images')
                        .getPublicUrl(filePath);

                    newUploadedUrls.push(publicUrl);
                }

                // Combine remaining existing images and new ones
                const finalImages = [...editingImageUrls, ...newUploadedUrls];

                // 2. Update product row in Supabase
                const { error: updateError } = await supabaseClient
                    .from('products')
                    .update({
                        name: name,
                        category: category,
                        category_key: categoryKey,
                        price: price,
                        original_price: originalPrice,
                        shipping_fee: shippingFee,
                        description: description,
                        images: finalImages,
                        colors: editingColors.length ? editingColors : null,
                        sizes: editingSizes.length ? editingSizes : null,
                        specs: editingSpecs
                    })
                    .eq('id', editingProduct.id);

                if (updateError) throw updateError;

                alert("Product updated successfully!");
                closeEditModal();
                await loadDashboardData();
                renderTabContent();
            } catch (err) {
                alert("Failed to update product: " + err.message);
                btn.innerHTML = `Save Changes`;
                btn.classList.remove('loading');
            }
        }
